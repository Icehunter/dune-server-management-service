apiVersion: v1
kind: ServiceAccount
metadata:
  name: server-management-service
  namespace: dune-system
---
# The helper scripts call arbitrary kubectl verbs against the funcom-seabass-*
# namespaces (get/edit battlegroups, exec into rmq pods, cp into db pods).
# cluster-admin matches what `sudo kubectl` granted before.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: server-management-service
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: server-management-service
    namespace: dune-system
